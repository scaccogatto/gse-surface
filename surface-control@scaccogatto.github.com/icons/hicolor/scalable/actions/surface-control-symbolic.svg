<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!--
    surface-control-symbolic.svg
    Symbolic icon for the Surface Control GNOME extension.
    Inspired by the Microsoft Surface diamond logo:
    a rhombus divided by a horizontal midline into upper and lower triangles.
    Uses currentColor — adapts to shell light/dark/accent themes.
  -->
  <!-- Upper triangle (slightly lighter feel via opacity) -->
  <path
    fill="currentColor"
    opacity="0.85"
    d="M 8 1.5 L 14.5 8 L 1.5 8 Z"
  />
  <!-- Lower triangle -->
  <path
    fill="currentColor"
    opacity="0.55"
    d="M 1.5 8 L 14.5 8 L 8 14.5 Z"
  />
</svg>
